name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use latest available Xcode (need Swift tools >= 6.1.0 for KeyboardShortcuts)
          ls -d /Applications/Xcode*.app | sort -V | tail -1 | xargs sudo xcode-select -s
          xcodebuild -version

      - name: Validate signing secrets
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=()
          for key in MACOS_CERT_P12_BASE64 MACOS_CERT_PASSWORD MACOS_SIGNING_IDENTITY MACOS_TEAM_ID; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required signing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Import signing certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/senseflow-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/senseflow-build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "SPM_CLONED_DIR=$RUNNER_TEMP/spm-cloned" >> "$GITHUB_ENV"

      - name: Resolve package dependencies
        run: |
          set -euo pipefail
          rm -rf "$SPM_CLONED_DIR"
          mkdir -p "$SPM_CLONED_DIR"
          xcodebuild -resolvePackageDependencies \
            -project SenseFlow.xcodeproj \
            -scheme SenseFlow \
            -clonedSourcePackagesDirPath "$SPM_CLONED_DIR"

      - name: Build for Apple Silicon
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild -project SenseFlow.xcodeproj \
            -scheme SenseFlow \
            -configuration Release \
            -arch arm64 \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$MACOS_SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$MACOS_TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            -clonedSourcePackagesDirPath "$SPM_CLONED_DIR"

      - name: Verify app signature
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release/SenseFlow.app"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dvv "$APP_PATH" 2>&1 | sed -n '1,40p'

      - name: Create DMG
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release/SenseFlow.app"
          DMG_NAME="SenseFlow-${GITHUB_REF_NAME}-arm64.dmg"

          # Create temporary DMG directory
          mkdir -p dmg_staging
          cp -R "$APP_PATH" dmg_staging/
          ln -s /Applications dmg_staging/Applications

          # Create DMG
          hdiutil create -volname "SenseFlow" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
