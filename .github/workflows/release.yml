name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use latest available Xcode (need Swift tools >= 6.1.0 for KeyboardShortcuts)
          ls -d /Applications/Xcode*.app | sort -V | tail -1 | xargs sudo xcode-select -s
          xcodebuild -version

      - name: Build for Apple Silicon
        run: |
          xcodebuild -project SenseFlow.xcodeproj \
            -scheme SenseFlow \
            -configuration Release \
            -arch arm64 \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/SenseFlow.app"
          DMG_NAME="SenseFlow-${GITHUB_REF_NAME}-arm64.dmg"

          # Create temporary DMG directory
          mkdir -p dmg_staging
          cp -R "$APP_PATH" dmg_staging/
          ln -s /Applications dmg_staging/Applications

          # Create DMG
          hdiutil create -volname "SenseFlow" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
